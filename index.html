<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🍊 濟州島旅遊地圖</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root {
  --topbar-h: 44px;
  --filterbar-h: 44px;
  --col-交通:#718096;--col-住宿:#805ad5;--col-景點:#3182ce;
  --col-購物:#e53e3e;--col-咖啡廳:#d69e2e;--col-美食:#38a169;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:"Noto Sans TC","Apple SD Gothic Neo","Helvetica Neue",sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;background:#1a1a2e;}

.topbar{background:#1a1a2e;color:#fff;padding:0 14px;height:var(--topbar-h);display:flex;align-items:center;gap:10px;flex-shrink:0;}
.topbar h1{font-size:14px;font-weight:700;white-space:nowrap;}
.topbar h1 span{color:#f4a261;}
.count-badge{background:#f4a261;color:#1a1a2e;font-size:11px;font-weight:800;padding:2px 7px;border-radius:12px;white-space:nowrap;}
.menu-btn{display:none;margin-left:auto;background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px;line-height:1;}

.filterbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 10px;height:var(--filterbar-h);display:flex;gap:5px;align-items:center;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filterbar::-webkit-scrollbar{display:none;}
.filter-label{font-size:10px;color:#718096;font-weight:700;white-space:nowrap;flex-shrink:0;}
.filter-btn{border:1.5px solid #e2e8f0;background:#f7fafc;color:#4a5568;font-size:11px;padding:4px 9px;border-radius:20px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;font-weight:500;touch-action:manipulation;}
.filter-btn:hover{border-color:#a0aec0;background:#edf2f7;}
.filter-btn.active{color:#fff!important;border-color:transparent!important;font-weight:700;}
.cat-交通.active{background:var(--col-交通);}
.cat-住宿.active{background:var(--col-住宿);}
.cat-景點.active{background:var(--col-景點);}
.cat-購物.active{background:var(--col-購物);}
.cat-咖啡廳.active{background:var(--col-咖啡廳);}
.cat-美食.active{background:var(--col-美食);}
.zone-btn.active{background:#2d3748;}
.sep{width:1px;height:20px;background:#e2e8f0;flex-shrink:0;}

.main{display:flex;flex:1;overflow:hidden;position:relative;}

.sidebar{width:270px;background:#fff;overflow-y:auto;border-right:1px solid #e2e8f0;flex-shrink:0;transition:transform .3s ease;}
.sidebar-header{padding:8px 12px;font-size:11px;color:#718096;font-weight:700;border-bottom:1px solid #edf2f7;position:sticky;top:0;background:#fff;z-index:2;display:flex;justify-content:space-between;align-items:center;}
.sidebar-close{display:none;background:none;border:none;font-size:18px;cursor:pointer;color:#718096;padding:0 4px;}
.place-item{padding:9px 12px;border-bottom:1px solid #f7fafc;cursor:pointer;transition:background .1s;}
.place-item:active{background:#edf2f7;}
.place-item.selected{background:#ebf8ff;border-left:3px solid #3182ce;}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;flex-shrink:0;}
.pname{font-size:13px;font-weight:700;color:#2d3748;display:flex;align-items:center;}
.psub{font-size:10px;color:#a0aec0;margin-top:1px;padding-left:13px;}
.phours{font-size:10px;color:#718096;margin-top:2px;padding-left:13px;}
.pprice{font-size:10px;color:#f4a261;font-weight:600;padding-left:13px;}
.cat-header{padding:5px 12px 3px;font-size:10px;font-weight:800;background:#f7fafc;border-bottom:1px solid #edf2f7;position:sticky;top:33px;z-index:1;}
.no-results{padding:24px 12px;text-align:center;color:#a0aec0;font-size:12px;}

#map{flex:1;z-index:0;}

.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:8998;}

/* POPUP */
.my-popup{position:fixed;background:#fff;border-radius:14px;box-shadow:0 10px 40px rgba(0,0,0,.2);padding:14px 16px;width:min(300px,calc(100vw - 24px));z-index:9999;pointer-events:auto;}
@media(max-width:640px){
  .my-popup{width:100%!important;left:0!important;right:0!important;bottom:0!important;top:auto!important;border-radius:16px 16px 0 0;max-height:75dvh;overflow-y:auto;}
}
.popup-drag{width:36px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 10px;}
.popup-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;}
.popup-close-btn{width:24px;height:24px;background:#f0f0f0;border:none;border-radius:50%;cursor:pointer;font-size:13px;line-height:24px;text-align:center;color:#666;flex-shrink:0;margin-left:8px;}
.popup-close-btn:hover,.popup-close-btn:active{background:#e2e8f0;}
.popup-cat{font-size:10px;font-weight:800;letter-spacing:.5px;margin-bottom:2px;}
.popup-name{font-size:15px;font-weight:800;color:#1a202c;line-height:1.2;}
.popup-kr{font-size:11px;color:#a0aec0;margin:3px 0 7px;}
.popup-row{font-size:11px;color:#4a5568;margin-bottom:3px;display:flex;gap:6px;}
.popup-row b{color:#2d3748;flex-shrink:0;}
.popup-addr-block{background:#f7fafc;border-radius:7px;padding:8px 10px;margin:7px 0;font-size:11px;color:#4a5568;line-height:1.7;}
.addr-label{font-size:10px;font-weight:700;color:#a0aec0;margin-bottom:3px;}
.addr-kr{font-weight:600;color:#2d3748;margin-bottom:2px;}
.addr-en{color:#718096;}
.popup-note{font-size:11px;color:#718096;line-height:1.5;margin-top:7px;padding-top:7px;border-top:1px solid #f0f0f0;max-height:80px;overflow-y:auto;}
.popup-btns{display:flex;gap:7px;margin-top:10px;}
.popup-btn{flex:1;text-align:center;padding:8px 4px;border-radius:8px;font-size:12px;font-weight:700;text-decoration:none;color:#fff;}
.btn-gmap{background:#4285F4;}
.btn-gmap:hover{background:#3367d6;}
.btn-naver{background:#03C75A;}
.btn-naver:hover{background:#02a64c;}

@media(max-width:768px){
  .menu-btn{display:block;}
  .sidebar-close{display:block;}
  .count-badge{display:none;}
  .sidebar{position:fixed;top:calc(var(--topbar-h) + var(--filterbar-h));bottom:0;left:0;width:100%;transform:translateX(-100%);z-index:8999;border-right:none;box-shadow:4px 0 20px rgba(0,0,0,.15);}
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay.show{display:block;}
  #map{width:100%;}
}
</style>
</head>
<body>

<div class="topbar">
  <h1>🍊 濟州島 <span>7天6夜</span> 旅遊地圖</h1>
  <span class="count-badge" id="visible-count">95 個地點</span>
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
</div>

<div class="filterbar">
  <span class="filter-label">類別</span>
  <button class="filter-btn cat-交通 active"   data-cat="交通"   onclick="toggleCat(this)">🚗 交通</button>
  <button class="filter-btn cat-住宿 active"   data-cat="住宿"   onclick="toggleCat(this)">🏨 住宿</button>
  <button class="filter-btn cat-景點 active"   data-cat="景點"   onclick="toggleCat(this)">📍 景點</button>
  <button class="filter-btn cat-購物 active"   data-cat="購物"   onclick="toggleCat(this)">🛍️ 購物</button>
  <button class="filter-btn cat-咖啡廳 active" data-cat="咖啡廳" onclick="toggleCat(this)">☕ 咖啡廳</button>
  <button class="filter-btn cat-美食 active"   data-cat="美食"   onclick="toggleCat(this)">🍽️ 美食</button>
  <div class="sep"></div>
  <span class="filter-label">區域</span>
  <button class="filter-btn zone-btn active" data-zone="all"   onclick="setZone(this)">全部</button>
  <button class="filter-btn zone-btn"        data-zone="north" onclick="setZone(this)">北部</button>
  <button class="filter-btn zone-btn"        data-zone="east"  onclick="setZone(this)">東部</button>
  <button class="filter-btn zone-btn"        data-zone="west"  onclick="setZone(this)">西部</button>
  <button class="filter-btn zone-btn"        data-zone="south" onclick="setZone(this)">南部</button>
  <button class="filter-btn zone-btn"        data-zone="udo"   onclick="setZone(this)">牛島</button>
</div>

<div class="main">
  <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span id="list-title">所有地點</span>
      <span style="display:flex;align-items:center;gap:8px;">
        <span id="list-count" style="color:#f4a261"></span>
        <button class="sidebar-close" onclick="closeSidebar()">✕</button>
      </span>
    </div>
    <div id="place-list"></div>
  </div>
  <div id="map"></div>
</div>

<div id="my-popup" class="my-popup" style="display:none;"></div>

const map=L.map("map",{center:[33.38,126.55],zoom:11});
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:"© <a href=\"https://www.openstreetmap.org/copyright\">OpenStreetMap</a>",maxZoom:19
}).addTo(map);

let activeCats=new Set(["交通","住宿","景點","購物","咖啡廳","美食"]);
let activeZone="all",selectedIdx=null,leafletMarkers=[];
const popupEl=document.getElementById("my-popup");
const isMobile=()=>window.innerWidth<=768;

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
}
function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}

function getZone(lat,lng){
  if(lng>126.88)return"udo";
  if(lat>33.47&&lng>126.45&&lng<126.62)return"north";
  if(lng>126.65)return"east";
  if(lng<126.43)return"west";
  return"south";
}
function isVisible(p){
  if(!activeCats.has(p.cat))return false;
  if(activeZone==="all")return true;
  return getZone(p.lat,p.lng)===activeZone;
}

function closePopup(){
  popupEl.style.display="none";
  if(selectedIdx!==null){selectedIdx=null;renderMarkers();renderList();}
}

function showPopup(idx){
  const p=DATA[idx];
  const col=COLORS[p.cat],em=EMOJIS[p.cat];

  // Naver Map: 用地址直接導航（比店名搜尋更準確）
  // 格式: https://map.naver.com/v5/search/{地址}
  const naverAddr = encodeURIComponent(p.addr_kr);
  const naverUrl  = "https://map.naver.com/v5/search/"+naverAddr;
  const gmapUrl   = p.place_id
    ? "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(p.kr) + "&query_place_id=" + p.place_id
    : "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(p.kr + " " + p.addr_kr);

  const drag=isMobile()?"<div class=\"popup-drag\"></div>":"";

  popupEl.innerHTML=drag+
    "<div class=\"popup-header\">"+
      "<div>"+
        "<div class=\"popup-cat\" style=\"color:"+col+"\">"+em+" "+p.cat+"</div>"+
        "<div class=\"popup-name\">"+p.zh+"</div>"+
        "<div class=\"popup-kr\">"+p.kr+" · "+p.en+"</div>"+
      "</div>"+
      "<button class=\"popup-close-btn\" onclick=\"closePopup()\">✕</button>"+
    "</div>"+
    "<div class=\"popup-row\"><b>⏰</b><span>"+p.hours+"</span></div>"+
    "<div class=\"popup-row\"><b>💰</b><span>"+p.price+"</span></div>"+
    "<div class=\"popup-addr-block\">"+
      "<div class=\"addr-label\">📍 地址</div>"+
      "<div class=\"addr-kr\">"+p.addr_kr+"</div>"+
      "<div class=\"addr-en\">"+p.addr_en+"</div>"+
    "</div>"+
    "<div class=\"popup-note\">"+p.note+"</div>"+
    "<div class=\"popup-btns\">"+
      "<a class=\"popup-btn btn-gmap\" href=\""+gmapUrl+"\" target=\"_blank\">🗺 Google Maps</a>"+
      "<a class=\"popup-btn btn-naver\" href=\""+naverUrl+"\" target=\"_blank\">🟢 Naver Map</a>"+
    "</div>";

  popupEl.style.display="block";

  if(!isMobile()){
    const mapDiv=document.getElementById("map");
    const rect=mapDiv.getBoundingClientRect();
    const point=map.latLngToContainerPoint([p.lat,p.lng]);
    let left=rect.left+point.x+18,top=rect.top+point.y-20;
    requestAnimationFrame(()=>{
      const pw=popupEl.offsetWidth,ph=popupEl.offsetHeight;
      if(left+pw>window.innerWidth-10) left=rect.left+point.x-pw-18;
      if(top+ph>window.innerHeight-10) top=window.innerHeight-ph-10;
      if(top<rect.top+10) top=rect.top+10;
      if(left<rect.left+10) left=rect.left+10;
      popupEl.style.left=left+"px";
      popupEl.style.top=top+"px";
    });
  }
}

function makeIcon(cat,selected){
  const col=COLORS[cat],size=selected?20:13,bdr=selected?3:2;
  return L.divIcon({
    className:"",
    html:"<div style=\"width:"+size+"px;height:"+size+"px;background:"+col+";border:"+bdr+"px solid #fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.35);cursor:pointer;\"></div>",
    iconSize:[size,size],iconAnchor:[size/2,size/2]
  });
}

function renderMarkers(){
  leafletMarkers.forEach(({marker})=>map.removeLayer(marker));
  leafletMarkers=[];
  DATA.forEach((p,i)=>{
    if(!isVisible(p))return;
    const isSel=selectedIdx===i;
    const marker=L.marker([p.lat,p.lng],{icon:makeIcon(p.cat,isSel),zIndexOffset:isSel?1000:0});
    marker.on("click",e=>{L.DomEvent.stopPropagation(e);selectPlace(i);});
    marker.addTo(map);
    leafletMarkers.push({marker,idx:i});
  });
}

map.on("click",()=>closePopup());

function selectPlace(idx){
  selectedIdx=idx;
  renderMarkers();renderList();showPopup(idx);
  const p=DATA[idx];
  map.setView([p.lat,p.lng],Math.max(map.getZoom(),14),{animate:true,duration:.5});
  document.querySelectorAll(".place-item.selected").forEach(el=>el.scrollIntoView({behavior:"smooth",block:"nearest"}));
  if(isMobile())closeSidebar();
}

function renderList(){
  const list=document.getElementById("place-list");
  const visible=DATA.filter(p=>isVisible(p));
  document.getElementById("list-count").textContent=visible.length+" 個";
  document.getElementById("visible-count").textContent=visible.length+" 個地點";
  if(!visible.length){list.innerHTML="<div class=\"no-results\">沒有符合的地點</div>";return;}
  const grouped={};
  DATA.forEach((p,i)=>{if(!isVisible(p))return;(grouped[p.cat]=grouped[p.cat]||[]).push({p,i});});
  const order=["交通","住宿","景點","購物","咖啡廳","美食"];
  let html="";
  order.forEach(cat=>{
    if(!grouped[cat])return;
    html+="<div class=\"cat-header\" style=\"color:"+COLORS[cat]+"\">"+EMOJIS[cat]+" "+cat+" ("+grouped[cat].length+")</div>";
    grouped[cat].forEach(({p,i})=>{
      html+="<div class=\"place-item"+(selectedIdx===i?" selected":"")+" \" onclick=\"selectPlace("+i+")\">"+
        "<div class=\"pname\"><span class=\"dot\" style=\"background:"+COLORS[p.cat]+"\"></span>"+p.zh+"</div>"+
        "<div class=\"psub\">"+p.en+"</div>"+
        "<div class=\"phours\">⏰ "+p.hours+"</div>"+
        "<div class=\"pprice\">💰 "+p.price+"</div></div>";
    });
  });
  list.innerHTML=html;
}

function toggleCat(btn){
  const cat=btn.dataset.cat;
  if(activeCats.has(cat)){if(activeCats.size===1)return;activeCats.delete(cat);btn.classList.remove("active");}
  else{activeCats.add(cat);btn.classList.add("active");}
  closePopup();renderMarkers();renderList();
}

const ZONE_BOUNDS={
  all:  [[33.10,126.10],[33.62,127.05]],
  north:[[33.47,126.45],[33.57,126.62]],
  east: [[33.37,126.65],[33.57,127.00]],
  west: [[33.19,126.12],[33.57,126.43]],
  south:[[33.19,126.30],[33.47,126.80]],
  udo:  [[33.48,126.88],[33.55,126.98]]
};
function setZone(btn){
  document.querySelectorAll(".zone-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  activeZone=btn.dataset.zone;
  closePopup();renderMarkers();renderList();
  document.getElementById("list-title").textContent=btn.textContent==="全部"?"所有地點":btn.textContent+"地點";
  map.fitBounds(ZONE_BOUNDS[activeZone],{padding:[30,30]});
}

renderMarkers();
renderList();
</script>
</body>
</html>
