<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🍊 濟州島旅遊地圖</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
/* ═══ TOKENS ═══ */
:root{
  --th:54px; --fh:50px; --sw:320px;
  --bg:#f6f4f0; --white:#fff; --border:#e7e2d9;
  --text:#211d18; --sub:#6f6559; --muted:#a39a8c;
  --accent:#f2670f; --accent-l:#fdf1e6;
  --topbar:#241f1a;
  --shadow-sm:0 1px 2px rgba(35,25,10,.06),0 1px 1px rgba(35,25,10,.04);
  --shadow-md:0 6px 20px rgba(35,25,10,.09),0 2px 6px rgba(35,25,10,.05);
  --shadow-lg:0 16px 44px rgba(35,25,10,.16),0 4px 12px rgba(35,25,10,.08);
  --r:14px; --r-sm:10px; --r-lg:20px;
  --font-ui:"Noto Sans TC","Noto Sans KR","Malgun Gothic","PingFang TC","SF Pro Display","Helvetica Neue",sans-serif;
  --交通:#5b7a8c;--住宿:#8b6fc7;--景點:#3e7fd1;
  --購物:#e0574a;--咖啡廳:#dd9a1f;--美食:#209a71;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font-ui);background:var(--bg);color:var(--text);display:flex;flex-direction:column;font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased}

/* ═══ TOPBAR ═══ */
.topbar{height:var(--th);background:var(--topbar);display:flex;align-items:center;padding:0 18px;gap:10px;flex-shrink:0;position:relative;z-index:20;box-shadow:0 1px 0 rgba(0,0,0,.2)}
.topbar-logo{font-size:22px}
.topbar-info{flex:1;min-width:0}
.topbar-title{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.2px;text-wrap:balance}
.topbar-title b{color:var(--accent)}
.topbar-sub{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px;font-weight:500;letter-spacing:.1px}
.badge{background:var(--accent);color:#fff;font-size:10.5px;font-weight:800;padding:4px 11px;border-radius:20px;white-space:nowrap;letter-spacing:.2px;font-variant-numeric:tabular-nums}
.menu-btn{display:none;width:36px;height:36px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:10px;color:#fff;font-size:18px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s}
.menu-btn:hover{background:rgba(255,255,255,.16)}

/* ═══ FILTERBAR ═══ */
.filterbar-wrap{position:relative;flex-shrink:0}
.filterbar-wrap::before,.filterbar-wrap::after{content:"";position:absolute;top:0;bottom:0;width:20px;z-index:3;pointer-events:none}
.filterbar-wrap::before{left:0;background:linear-gradient(90deg,var(--white),transparent)}
.filterbar-wrap::after{right:0;background:linear-gradient(270deg,var(--white),transparent)}
.filterbar{height:var(--fh);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;padding:0 14px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;box-shadow:var(--shadow-sm)}
.filterbar::-webkit-scrollbar{display:none}
.fsep{width:1px;height:18px;background:var(--border);flex-shrink:0;margin:0 3px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:20px;font-size:11.5px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;border:1.5px solid var(--border);background:var(--white);color:var(--sub);transition:border-color .15s,color .15s,background .15s,transform .1s;user-select:none}
.chip:hover{border-color:#c9c0b1;color:var(--text);background:var(--bg)}
.chip:active{transform:scale(.96)}
.chip.active{color:#fff;border-color:transparent;font-weight:700;box-shadow:var(--shadow-sm)}
.chip-交通.active{background:var(--交通)}
.chip-住宿.active{background:var(--住宿)}
.chip-景點.active{background:var(--景點)}
.chip-購物.active{background:var(--購物)}
.chip-咖啡廳.active{background:var(--咖啡廳);color:#1a1a2a}
.chip-美食.active{background:var(--美食)}

/* ═══ ROUTE FILTERBAR (分區路線，獨立一列) ═══ */
.filterbar-route{border-top:1px solid var(--border)}
.filterbar-route .chip.active{background:var(--sub);color:#fff}
.filterbar-day{border-top:1px solid var(--border)}
.filterbar-day .chip.active{background:var(--sub);color:#fff;border-color:transparent}
.chip-selectall.active{background:var(--sub);color:#fff;border-color:transparent}

/* ═══ MAIN ═══ */
.main{display:flex;flex:1;overflow:hidden;min-height:0;position:relative}

/* ═══ SIDEBAR ═══ */
.sidebar{width:var(--sw);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:transform .3s cubic-bezier(.22,1,.36,1)}
.sb-head{padding:16px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--white)}
.sb-head-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
.sb-title{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.sb-cnt{font-size:12px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums}
.search-wrap{position:relative}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;color:var(--muted)}
.search-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:9px 12px 9px 35px;font-size:12.5px;color:var(--text);outline:none;font-family:inherit;transition:border-color .15s,background .15s}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:var(--accent);background:#fff}
.search-clear{display:none;position:absolute;right:8px;top:50%;transform:translateY(-50%);width:20px;height:20px;border:none;background:var(--border);color:var(--sub);border-radius:50%;font-size:11px;line-height:1;cursor:pointer;align-items:center;justify-content:center}
.search-clear:hover{background:#d9d1c2;color:var(--text)}
.search-wrap.has-value .search-clear{display:flex}
.search-wrap.has-value .search-input{padding-right:30px}

/* ═══ PLACE LIST ═══ */
.plist{overflow-y:auto;flex:1}
.plist::-webkit-scrollbar{width:3px}
.plist::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.cat-hdr{padding:11px 16px 5px;font-size:9.5px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;display:flex;align-items:center;gap:7px;position:sticky;top:0;background:var(--white);z-index:2}
.cat-hdr-line{flex:1;height:1px;background:var(--border)}
.pitem{padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative;animation:itemIn .28s cubic-bezier(.22,1,.36,1) backwards}
.pitem:hover{background:var(--bg)}
.pitem.sel{background:var(--accent-l);border-left:3px solid var(--accent);padding-left:13px;transition:background .12s,padding-left .12s}
@keyframes itemIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@media(prefers-reduced-motion:reduce){.pitem{animation:none}}
.pitem-top{display:flex;align-items:flex-start;gap:9px}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;box-shadow:0 0 0 3px rgba(0,0,0,.04)}
.pname{font-size:13px;font-weight:700;color:var(--text);line-height:1.35}
.pen{font-size:10.5px;color:var(--muted);padding-left:17px;margin-top:2px}
.pdish{display:inline-block;font-size:10px;font-weight:700;color:var(--美食);background:color-mix(in srgb,var(--美食) 12%,var(--white));border:1px solid color-mix(in srgb,var(--美食) 30%,var(--white));padding:2px 8px;border-radius:20px;margin:5px 0 0 17px}
.pmeta{display:flex;gap:8px;padding-left:17px;margin-top:5px;flex-wrap:wrap}
.ptag{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--sub);background:var(--bg);padding:3px 8px;border-radius:6px;font-weight:600}
.no-result{padding:36px 16px;text-align:center;color:var(--muted);font-size:12.5px}

/* ═══ MAP ═══ */
#map{flex:1;min-width:0;min-height:0;z-index:0}

.locate-btn{width:34px;height:34px;background:var(--white);border-radius:var(--r-sm);box-shadow:var(--shadow-md);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--sub);transition:color .15s,transform .1s;margin-top:8px}
.locate-btn:hover{color:var(--accent)}
.locate-btn:active{transform:scale(.93)}
.locate-btn svg{width:18px;height:18px}
.locate-btn.locating svg{animation:locateSpin 1s linear infinite}
.locate-btn.err{color:#c14a1f}
@keyframes locateSpin{to{transform:rotate(360deg)}}
@media(prefers-reduced-motion:reduce){.locate-btn.locating svg{animation:none}}

.me-dot{width:16px;height:16px;position:relative}
.me-dot::after{content:"";position:absolute;inset:3px;background:#1a73e8;border:2px solid #fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.me-dot-pulse{position:absolute;inset:0;border-radius:50%;background:rgba(26,115,232,.35);animation:mePulse 1.8s ease-out infinite}
@keyframes mePulse{0%{transform:scale(.6);opacity:1}100%{transform:scale(2.2);opacity:0}}
@media(prefers-reduced-motion:reduce){.me-dot-pulse{animation:none;display:none}}

/* ═══ SOVERLAY ═══ */
.soverlay{position:fixed;inset:0;background:rgba(20,15,8,.4);backdrop-filter:blur(3px);z-index:8998;opacity:0;visibility:hidden;transition:opacity .24s ease,visibility 0s linear .24s}
.soverlay.show{opacity:1;visibility:visible;transition:opacity .24s ease,visibility 0s linear 0s}

/* ═══ POPUP WRAP ═══ */
.popup-wrap{position:absolute;top:14px;right:14px;width:320px;z-index:1000;pointer-events:none}

/* ═══ POPUP CARD ═══ */
.popup-card{
  background:#fff;border-radius:var(--r-lg);overflow:hidden;
  box-shadow:var(--shadow-lg);
  border:1px solid rgba(35,25,10,.05);
  transform:translateX(22px) translateY(6px) scale(.95);opacity:0;visibility:hidden;
  transition:transform .34s cubic-bezier(.22,1,.36,1),opacity .26s ease,visibility 0s linear .34s;
  will-change:transform,opacity;
}
.popup-card.is-open{
  transform:translateX(0) translateY(0) scale(1);opacity:1;visibility:visible;pointer-events:auto;
  transition:transform .34s cubic-bezier(.22,1,.36,1),opacity .2s ease,visibility 0s linear 0s;
}
.popup-wrap.closing .popup-card{
  transform:translateX(14px) translateY(3px) scale(.97);opacity:0;visibility:visible;
  transition:transform .22s cubic-bezier(.5,0,.75,0),opacity .18s ease .02s,visibility 0s linear .22s;
}

/* ─ Popup 頂部色條 ─ */
.pc-bar{height:5px;width:100%}

/* ─ Popup 主體 ─ */
.pc-body{padding:18px}

/* ─ 頭部：名稱 + 關閉 ─ */
.pc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:13px}
.pc-head-left{flex:1;min-width:0}
.pc-cat{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.pc-name{font-size:17px;font-weight:800;color:var(--text);line-height:1.25;margin-bottom:3px;letter-spacing:-.2px;text-wrap:balance}
.pc-kr{font-size:11px;color:var(--muted);font-weight:500}

/* ─ 快速資訊 Pills ─ */
.pc-pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:15px}
.pc-pill{display:inline-flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);padding:7px 11px;font-size:11.5px;font-weight:600;color:var(--text);flex:1;min-width:0;overflow-wrap:anywhere}
.pc-pill-ico{font-size:13px;flex-shrink:0}
.pc-pill-val{color:var(--text);font-weight:700;font-size:11px;line-height:1.3;min-width:0;font-variant-numeric:tabular-nums;overflow-wrap:anywhere}
.pc-pill-lbl{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}


/* ─ 筆記區 ─ */
.pc-note-wrap{margin-bottom:15px}
.pc-note-title{font-size:9.5px;font-weight:800;letter-spacing:.9px;text-transform:uppercase;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:6px}
.pc-note-title::after{content:"";flex:1;height:1px;background:var(--border)}
.pc-note-body{max-height:230px;overflow-y:auto;padding-right:3px;overflow-wrap:anywhere}
.pc-note-body::-webkit-scrollbar{width:3px}
.pc-note-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* 筆記解析後的樣式 */
.note-section{margin-bottom:9px}
.note-section:last-child{margin-bottom:0}
.note-body{font-size:12px;color:#4a4438;line-height:1.75}
.note-body b,.note-highlight{color:var(--text);font-weight:700}
.note-warn{color:#c14a1f;font-weight:600}
.note-price{color:#1a7a52;font-weight:700;font-variant-numeric:tabular-nums}

/* ─ 按鈕 ─ */
.pc-btns{display:flex;gap:8px}
.pc-btn{flex:1;padding:11px 8px;border-radius:var(--r-sm);font-size:12px;font-weight:800;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:5px;transition:filter .12s,transform .1s;border:none;cursor:pointer;letter-spacing:.2px}
.pc-btn:active{transform:scale(.97)}
.pc-btn-g{background:#1a73e8;color:#fff}
.pc-btn-g:hover{filter:brightness(.92)}
.pc-btn-n{background:#03C75A;color:#fff}
.pc-btn-n:hover{filter:brightness(.92)}

/* ─ Drag handle (mobile) ─ */
.pc-drag{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 6px}

/* ═══ MOBILE ═══ */
@media(max-width:640px){
  .menu-btn{display:flex}
  .badge{display:none}
  .sidebar{position:fixed;top:0;bottom:0;left:0;width:min(var(--sw),88vw);transform:translateX(-100%);z-index:8999;box-shadow:4px 0 30px rgba(0,0,0,.15);padding-top:env(safe-area-inset-top)}
  .sidebar.open{transform:translateX(0)}
  .soverlay.show{display:block}

  .popup-wrap{position:fixed;top:auto;right:0;bottom:0;left:0;width:100%;z-index:9000}
  .popup-card{border-radius:20px 20px 0 0;box-shadow:0 -8px 32px rgba(35,25,10,.18);max-height:82dvh;overflow-y:auto;transform:translateY(110%) scale(1);opacity:1}
  .popup-card.is-open{transform:translateY(0) scale(1);transition:transform .36s cubic-bezier(.22,1,.36,1),visibility 0s linear 0s}
  .popup-wrap.closing .popup-card{transform:translateY(110%) scale(1);visibility:visible;opacity:1;transition:transform .26s cubic-bezier(.5,0,.85,0),visibility 0s linear .26s}
  .pc-bar{display:none}
}
@media(min-width:641px){.pc-drag{display:none}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="topbar-logo">🍊</span>
  <div class="topbar-info">
    <div class="topbar-title">濟州島 <b>7天6夜</b> 旅遊地圖</div>
    <div class="topbar-sub">7/23–7/29 · 4人 · 順時針自駕</div>
  </div>
  <span class="badge" id="vc">140 個地點</span>
  <button class="menu-btn" id="menubtn" onclick="toggleSB()">☰</button>
</div>

<!-- FILTERBAR -->
<div class="filterbar-wrap">
<div class="filterbar">
  <button class="chip chip-selectall active" data-group="cat" onclick="selectAllGroup(this)">全選</button>
  <button class="chip chip-交通 active" data-cat="交通"   onclick="toggleCat(this)">🚗 交通</button>
  <button class="chip chip-住宿 active" data-cat="住宿"   onclick="toggleCat(this)">🏨 住宿</button>
  <button class="chip chip-景點 active" data-cat="景點"   onclick="toggleCat(this)">📍 景點</button>
  <button class="chip chip-購物 active" data-cat="購物"   onclick="toggleCat(this)">🛍️ 購物</button>
  <button class="chip chip-咖啡廳 active" data-cat="咖啡廳" onclick="toggleCat(this)">☕ 咖啡廳</button>
  <button class="chip chip-美食 active" data-cat="美食"   onclick="toggleCat(this)">🍽️ 美食</button>
</div>
</div>

<!-- ROUTE FILTERBAR（分區路線，獨立一列） -->
<div class="filterbar-wrap">
<div class="filterbar filterbar-route">
  <button class="chip chip-selectall active" data-group="route" onclick="selectAllGroup(this)">全選</button>
  <button class="chip chip-route-牛島 active" data-route="牛島" onclick="toggleRoute(this)">牛島</button>
  <button class="chip chip-route-東南 active" data-route="東南" onclick="toggleRoute(this)">東南</button>
  <button class="chip chip-route-東北 active" data-route="東北" onclick="toggleRoute(this)">東北</button>
  <button class="chip chip-route-西南 active" data-route="西南" onclick="toggleRoute(this)">西南</button>
  <button class="chip chip-route-中段 active" data-route="中段" onclick="toggleRoute(this)">中段</button>
  <button class="chip chip-route-西線沿海 active" data-route="西線沿海" onclick="toggleRoute(this)">西線沿海</button>
  <button class="chip chip-route-市區 active" data-route="市區" onclick="toggleRoute(this)">市區</button>
</div>
</div>

<!-- DAY FILTERBAR（按行程天數篩選，獨立一列） -->
<div class="filterbar-wrap">
<div class="filterbar filterbar-day">
  <button class="chip chip-day active" data-day="0" onclick="selectDay(this)">全部</button>
  <button class="chip chip-day" data-day="1" onclick="selectDay(this)">Day1 7/23</button>
  <button class="chip chip-day" data-day="2" onclick="selectDay(this)">Day2 7/24</button>
  <button class="chip chip-day" data-day="3" onclick="selectDay(this)">Day3 7/25</button>
  <button class="chip chip-day" data-day="4" onclick="selectDay(this)">Day4 7/26</button>
  <button class="chip chip-day" data-day="5" onclick="selectDay(this)">Day5 7/27</button>
  <button class="chip chip-day" data-day="6" onclick="selectDay(this)">Day6 7/28</button>
  <button class="chip chip-day" data-day="7" onclick="selectDay(this)">Day7 7/29</button>
</div>
</div>

<div class="main" id="main">
  <div class="soverlay" id="sov" onclick="closeSB()"></div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sb">
    <div class="sb-head">
      <div class="sb-head-row">
        <span class="sb-title" id="sbt">所有地點</span>
        <span style="display:flex;gap:8px;align-items:center">
          <span class="sb-cnt" id="sbc"></span>
        </span>
      </div>
      <div class="search-wrap" id="sw">
        <span class="search-ico">🔍</span>
        <input class="search-input" id="si" placeholder="搜尋地點、類型、特色…" oninput="onSearch(this.value)">
        <button class="search-clear" onclick="clearSearch()" aria-label="清空搜尋">✕</button>
      </div>
    </div>
    <div class="plist" id="pl"></div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- POPUP -->
  <div class="popup-wrap" id="pw">
    <div class="popup-card" id="pc">
      <div class="pc-drag"></div>
      <div class="pc-bar" id="pbar"></div>
      <div class="pc-body">
        <div id="pc-head"></div>
        <div id="pc-pills"></div>
        <div id="pc-note"></div>
        <div id="pc-btns"></div>
      </div>
    </div>
  </div>
</div>

<script>

er.com/p/entry/place/1669734880","addr_en":"478 Eorimbi-ro, Aewol-eup, Jeju, South Korea","addr_kr":"제주시 애월읍 어림비로 478","lat":33.3967678,"lng":126.345047,"hours":"10:00-20:00","price":"Trip.com預訂NT$388起","day":[5,6],"note":"【沉浸式藝術】超震撼多媒體數位藝術館，全程可拍照，梵谷星空廳、克林姆金色廳最出片，園區比想像中大、分區主題豐富；建議1-1.5小時，是雨天必訪的室內景點，傍晚光影效果更好。\n推薦：互動畫魚掃描投影特別受歡迎。\n停車：館內雖設有停車場，但車位不多，人潮多時較不易停到。\n注意事項：Klook等平台僅小幅折扣（約5%內），現場購票價差不大；官網提醒用地번住所導航有時會導到錯誤地點，務必用道路名住所（어림비로478）搜尋；逛超過1小時都不無聊，親子和情侶都適合，但部分展區偏暗建議留意腳步。","place_id":"ChIJUwtlFmhfDDURUr3BMm9Sb6k"},{"cat":"景點","route":"東北","zh":"海女博物館","en":"Jeju Haenyeo Museum","kr":"제주 해녀박물관","naver_url":"https://map.naver.com/p/entry/place/12200322","addr_en":"26 Haenyeobangmulgwan-gil, Gujwa-eup, Jeju, South Korea","addr_kr":"제주시 구좌읍 해녀박물관길 26","lat":33.5235989,"lng":126.8633983,"hours":"09:00-18:00（週一公休）","price":"門票現場₩1,100/人","day":[3],"note":"【文化體驗】深入了解濟州海女文化，展覽內容紮實、能深入了解海女生活與辛酸，中英日韓語紀錄片輪播；建議參觀約1小時，入場費親民且設有無障礙坡道方便帶小孩或長輩。\n推薦：對面海岸每天都能看到真正海女在作業（免費觀賞）。\n停車：館前設有停車場，停車方便。\n注意事項：建議上午前往，較有機會遇到海女在岸邊工作，館內遊客也相對較少；是雨天室內備案首選，外國遊客比例甚至比本地人還多。","place_id":"ChIJdU_EpXYWDTURfTQfg14zAKw"},{"cat":"景點","route":"東北","zh":"咸德海灘","en":"Hamdeok Beach","kr":"함덕해수욕장","naver_url":"https://map.naver.com/p/entry/place/11491805","addr_en":"525 Johamhaean-ro, Jocheon-eup, Jeju-si","addr_kr":"제주시 조천읍 조함해안로 525","lat":33.5431082,"lng":126.6696924,"hours":"24小時","price":"免費","day":[1],"note":"【海灘】水質清澈的淺藍色海灘，細白沙灘廣闊，水深較淺很適合戲水，水淺浪穩很適合帶小孩戲水；對面犀牛峰景觀也很棒，晚霞景色絕美，傍晚必來。\n推薦：旁邊Delmoondo等知名咖啡廳看海視野極佳，適合喝咖啡看海。\n停車：停車場緊鄰海灘，但免費停車場車位有限，旺季常一位難求。\n注意事項：「신북로」是附近1132縣道的主幹道名稱，並非海水浴場門口地址，用它導航可能被帶到主幹道而非沙灘停車場，建議直接搜尋「함덕해수욕장」較準確。","place_id":"ChIJVSv3qq_8DDURcLh4pWxZ0vA"},{"cat":"景點","route":"西線沿海","zh":"挾才海水浴場","en":"Hyeopjae Beach","kr":"협재해수욕장","naver_url":"https://map.naver.com/p/entry/place/11491807","addr_en":"329-10 Hallim-ro, Hallim-eup, Jeju, South Korea","addr_kr":"제주시 한림읍 한림로 329-10","lat":33.3943224,"lng":126.23989,"hours":"24小時","price":"免費","day":[5],"note":"【海灘】濟州西部最美海灘，蒂芬妮藍清澈海水，遠眺飛揚島，水質透明見底，沙質細白；沙灘淺水好戲水，沖腳沖水設施 會太重，是隱藏版招牌餐點。\n停車：館外設有寬敞停車場，停車相當方便。\n注意事項：建議上午較早時段前往，遊客較少、光線也更適合拍照，午後常有大批團客湧入；必買濟州綠茶茶葉與抹茶甜點禮盒（比機場便宜）；也可參加茶品體驗課程搭配北村海景一起享受，逛完可到附設商店選購抹茶零食伴手禮。","place_id":"ChIJEczrGRJdDDUR0cpD2okSp7g"},{"cat":"景點","route":"東南","zh":"城山日出峰","en":"Seongsan Ilchulbong","kr":"성산일출봉","naver_url":"https://map.naver.com/p/entry/place/11491438","addr_en":"284-12 Ilchul-ro, Seongsan-eup, Seogwipo-si, South Korea","addr_kr":"서귀포시 성산읍 일출로 284-12","lat":33.4588827,"lng":126.9408234,"hours":"依季節(夏季約04:30開放)","price":"門票現場₩5,000/人（山腳園區免費）","day":[2],"note":"【UNESCO世界遺產】濟州東部地標，登頂步道約25分鐘（約600階石階），頂部俯瞰360度海景與巨大火山口；夏季開放05:00-20:00。\n推薦：山腳下每天14:00有海女潛水表演（免費）；不只日出，傍晚來看夕陽也絕美到讓人難忘。\n停車：停車場大，免費停車。\n注意事項：僅能現場購票，未見旅遊平台販售更便宜的優惠票；每月第一個星期一為公休日（遇國定假日順延一天休館），出發前建議先確認當月是否公休；看日出建議04:30前到，夏季日出約05:20，最佳策略是日出後7-8點登頂，較涼快且人少；登頂階梯多會有點喘但值得，不想爬山的話走免費路線也能欣賞火山口與牛島美景。","place_id":"ChIJn3jj9rkUDTURS7YjOgUyUVU"},{"cat":"景點","route":"東北","zh":"月汀里海灘","en":"Woljeongri Beach","kr":"월정리해변","naver_url":"https://map.naver.com/p/entry/place/20561777","addr_en":"Woljeong-ri, Gujwa-eup, Jeju, South Korea","addr_kr":"제주시 구좌읍 월정리","lat":33.5557089,"lng":126.7966561,"hours":"24小時","price":"免費","day":[1],"note":"【打卡海灘】以令人屏息的「果凍海」漸層藍綠色聞名，白沙灘配翡翠漸層海水美得像明信片。\n推薦：沿海岸公路有Cafe MouMoon、Mongle、Cafe Moalboal、Layover等打卡咖啡廳，適合安排一日咖啡廳巡禮。\n停車：停車場位於海灘旁，夏季建議早到，也可找防波堤附近的空位。\n注意事項：門牌號約為해맞이해안로485一帶（也有標示480-1），建議現場核對門牌；最佳拍攝時段為晴天上午10-14點光線最好；沖洗更衣室就在沙灘後方很方便；近期外國旅行團大量湧入，變得比較擁擠、少了原本的悠閒感。","place_id":"ChIJxR5oOuwXDTUR7OVyfNv5QT4"},{"cat":"景點","route":"東北","zh":"金寧海水浴場","en":"Gimnyeong Beach","kr":"김녕해수욕장","naver_url":"https://map.naver.com/p/entry/place/13491485","addr_en":"237 Gujwahaean-ro, Gujwa-eup, Jeju-si, South Korea","addr_kr":"제주시 구좌읍 구좌해안로 237","lat":33.5577826,"lng":126.7594902,"hours":"24小時","price":"免費","day":[1],"note":"【清靜海灘】遊客比月汀里、咸德海灘都少，更適合安靜享受海景，水質優良，沙質細白，白沙灘配鈷藍海水很漂亮；水深平緩很適合親子戲水，退潮時還能在礁石間找螃蟹章魚。\n停車：沖洗室、免費停車場等設施也很齊全。\n注意事項：官方全名為「金寧城世紀海邊(김녕성세기해변)」，地圖上搜尋兩個名字都可找到同一地點；距萬丈窟約5分鐘車程，可搭配遊覽；夏季旺季建議上午較早時段前往，人潮較少。","place_id":"ChIJu4uuGSAZDTURlCyaXTq0jQw"},{"cat":"景點","route":"東北","zh":"杏源海灘(柯南海灘)","en":"Haengwon Beach (Conan Beach)","kr":"행원해변(코난해변)","naver_url":"https://map.naver.com/p/entry/place/1892836085","addr_en":"648 Haemajihaean-ro, Gujwa-eup, Jeju-si, South Korea","addr_kr":"제주시 구좌읍 해맞이해안로 648","lat":33.5575731,"lng":126.8111927,"hours":"24小時","price":"免費","day":[1],"note":"【小眾景點】因名偵探柯南動畫取景地聞名，又稱「柯南海灘」。石頭上的塗鴉很有特色。保留原始自然風貌，遊客少，適合安靜拍照。距月汀里約5分鐘車程。\n停車：停車位有限，建議配合退潮時間前往。\n注意事項：非濟州市正式指定海水浴場，沒有淋浴間與廁所（約300公尺外有公廁）。","place_id":"ChIJkeFHN5wXDTUREQkuDYsoO3o"},{"cat":"景點","route":"中段","zh":"新星朋友","en":"Saebyeol Friends","kr":"새별프렌즈","naver_url":"https://map.naver.com/p/entry/place/1882939263","addr_en":"1529 Pyeonghwa-ro, Aewol-eup, Jeju-si, South Korea","addr_kr":"제주시 애월읍 평화로 1529","lat":33.3617804,"lng":126.3638811,"hours":"09:00-17:00","price":"門票現場₩18,000/人","day":[5,6],"note":"【動物互動】正式名稱：Saebyeol Friends（本地原名Alpaca World），位於애월읍봉성리（涯月邑），可近距離與羊駝、迷你馬、山羊互動；動物採放養方式互動感十足。\n推薦：餵食羊駝、迷你馬、鸚鵡體驗都很受歡迎；建議停留1-1.5小時，開園09:00剛開門時前往，動物較活潑、遊客較少，方便近距離互動與拍照。\n停車：停車場空間寬敞且免費，停車相當輕鬆。\n注意事項：門票成人約₩18,000（含飼料體驗），24個月以下幼兒憑證件可免費；線上代訂（Gmarket等平台）約₩17,000，與現場價格相近，差異不大；職員親切講解仔細，外國遊客比例很高；缺點是動物到處便便要留意腳下，雨天穿雨衣照樣玩得盡興。","place_id":"ChIJ2aeYJsJZDDURh34YiAB7StM"},{"cat":"景點","route":"東北","zh":"萬丈窟","en":"Manjanggul Lava Tube","kr":"만장굴","naver_url":"https://map.naver.com/p/entry/place/17030877","addr_en":"182 Manjanggul-gil, Gujwa-eup, Jeju, South Korea","addr_kr":"제주시 구좌읍 만장굴길 182","lat":33.5492667,"lng":126.7781375,"hours":"09:00-17:00","price":"門票現場₩4,000/人","day":[1],"note":"【UNESCO世界遺產】火山熔岩洞窟，全長7.4km，開放遊覽約1km，末端有壯觀熔岩柱；因步道整修（原木棧道改為不鏽鋼棧道、加裝低照度LED燈）自2023年12月底閉館，已於2026年5月30日重新開放。\n停車：設有大型免費專用停車場，車位充足，但假日易客滿，建議提早前往。\n注意事項：洞內開放至18:00（售票至17:00截止）；洞內恆溫13-18°C，夏天特別涼快，建議帶薄外套，並穿防滑鞋（洞內昏暗有水滴）；建議遊覽時間約90分鐘；每月第一個星期三為公休日，出發前建議先確認當月是否公休；剛重新開放遊客較多，建議平日或上午前往可減少排隊等候。","place_id":"ChIJmWohlsQZDTURppUrDPCrZrs"},{"cat":"景點","route":"市區","zh":"濟州民俗五日市場","en":"Jeju Five-Day Folk Market","kr":"제주민속오일시장","naver_url":"https://map.naver.com/p/entry/place/13224752","addr_en":"26 Oiljangseo-gil, Jeju-si, South Korea","addr_kr":"제주시 오일장서길 26","lat":33.4970009,"lng":126.4753129,"hours":"07:00-18:00 (僅逢每月2、7、12、17、22、27日開市)","price":"依消費而定","day":[6],"note":"【傳統市集】販售農產品、海鮮、衣物、生活用品，非常在地，市場規模比想像中大也整理得乾淨；開市日僅限每月尾數2、7的日期，現金為主。\n推薦：現代食堂的辣拌麵、五日場炒年糕串(소떡소떡)、傳統復古餅乾都值得一試；在地種的迷你芒果新鮮又便宜。\n停車：市場周邊有公有停車場（免費），但開市日尖峰時段（上午10點至下午2點）車潮壅塞、一位難求，建議避開尖峰或提早前往。\n注意事項：建議早上10點前到品項最齊；建議韓文導航直接搜尋「오일장서길26」較準確；攤販普遍親切。","place_id":"ChIJqddPRfv6DDURXlOma7QfJSw"},{"cat":"景點","route":"東南","zh":"Yumin Art Nouveau Collection","en":"Yumin Art Nouveau Collection","kr":"유민아르누보뮤지엄","naver_url":"https://map.naver.com/p/entry/place/30820714","addr_en":"107 Seopjikoji-ro, Seongsan-eup, Seogwipo-si, Jeju, South Korea","addr_kr":"서귀포시 성산읍 섭지코지로 107","lat":33.4291638,"lng":126.9322343,"hours":"09:00-18:00","price":"門票現場₩20,000/人","day":[3],"note":"【建築藝術】安藤忠雄設計的美術館，位於涉地可支，展示歐洲新藝術運動時期玻璃工藝品，清水混凝土建築本身即是藝術品，將濟州風光與清水混凝土工法融合得很美；與Glass House步行500m，適合和涉地可支排在同一天，兩處合排約1.5-2小時。\n推薦：館內咖啡廳咖啡和麵包也不錯。\n停車：園區內個人車輛無法直接開到館前，需先停在휘닉스아일랜드（Phoenix Island）入口停車場，再轉搭免費接駁車（約5分鐘）或步行（約20分鐘）上山，購票時可登記當日免費停車。\n注意事項：售票至傍晚5點截止，每月第一個星期二為公休日，出發前建議查휘닉스官網公告確認是否有臨時公休；門票現場價已調漲，是否仍有線上優惠請以現場最新公告為準；建議平日前往，假日常有婚紗拍攝與旅行團同時到訪，人潮較多。","place_id":"ChIJi36zhWoTDTUR5gZYtDw6U8c"},{"cat":"景點","route":"東南","zh":"Glass House","en":"Jeju Glass House","kr":"유리의집","naver_url":"https://map.naver.com/p/entry/place/30820715","addr_en":"46 Goseong-ri, Seongsan-eup, Seogwipo, South Korea","addr_kr":"서귀포시 성산읍 고성리 46","lat":33.4290169,"lng":126.9340853,"hours":"需現場確認","price":"免費（餐飲另計）","day":[3],"note":"【建築觀景】安藤忠雄設計的觀景建築，與Yumin美術館步行500m，以玻璃與清水混凝土打造，融合觀景咖啡廳功能，兩棟是涉地可支最值得打卡的建築體驗；建築本身與1樓Zippo打火機博物館皆免費參觀，僅需另行消費餐飲。\n推薦：2樓為人氣景觀餐廳「민트(Mint)」，靠窗景觀座位搶手，用餐建議提前預約。\n停車：與Yumin美術館同屬휘닉스아일랜드園區，個人車輛需先停在山下停車場，再轉搭免費接駁車或步行上來。\n注意事項：建議傍晚前往，夕陽映照海景視野最美，也可避開中午旅行團人潮尖峰。","place_id":"ChIJxwFNVulcDDURrerkxP0oEK0"},{"cat":"景點","route":"西南","zh":"M1971遊艇俱樂部","en":"M1971 Yacht Tour","kr":"M1971 요트투어","naver_url":"https://map.naver.com/p/entry/place/1953276134","addr_en":"128 Choenamdanhaean-r 、玩偶小物都很可愛，連濟州限定款和米菲兔周邊都找得到。\n停車：店門正對面的收費停車場每小時約₩5,000，短暫停留可考慮找稍遠處的免費車位。\n注意事項：很多人原本只是路過買個指甲剪，結果忍不住多帶了幾樣紀念品回家。","place_id":"ChIJgwfRPgQZDTURDVOsxcPDBuY"},{"cat":"購物","route":"市區","zh":"橘橘店(道頭店)","en":"Gyulgyul Store (Dodu)","kr":"귤귤스토어 도두점","naver_url":"https://map.naver.com/p/entry/place/1643720814","addr_en":"238 Seohaean-ro, Jeju, South Korea","addr_kr":"제주시 서해안로 238","lat":33.5088464,"lng":126.4714866,"hours":"09:00-20:00","price":"依消費而定","day":[6],"note":"【購物】濟州限定米菲兔周邊專賣店，緊鄰機場；除了玩偶還有護手霜、手鍊、毛巾等生活小物可以一次買齊。\n推薦：戴橘子帽米菲玩偶（₩25,000起）、橘子米菲馬克杯、限定文具，其中海女造型系列周邊也很受歡迎。\n停車：店門口停車格僅約2個位置，較為狹小，建議把車停在附近再走過來。\n注意事項：熱銷款常售罄，建議一下飛機就來，或回程留時間購物；要看清楚標價，同款玩偶價差可能到一萬元以上。","place_id":"ChIJNSTTITb7DDUREjKDmkVu8wo"},{"cat":"購物","route":"市區","zh":"Accord Jeju","en":"Accord Jeju","kr":"어코드 제주","naver_url":"https://map.naver.com/p/entry/place/1229169422","addr_en":"342 Seohaean-ro, Jeju, South Korea","addr_kr":"제주시 서해안로 342","lat":33.5101288,"lng":126.4815571,"hours":"週一、四 10:00-19:00；週五、日 13:00-19:00（週二、三公休）","price":"依消費而定","day":[6],"note":"【購物/體驗】以MBTI概念設計的香水與銀鹽飾品選物店，店內有橘色貓咪和黃金獵犬可互動拍照；可以邊看海景邊調香、老師講解仔細，混合喜歡的香調體驗很好玩，做完還會送小卡貼紙，適合情侶或家人一起體驗做紀念。\n推薦：香水₩30,000-50,000，銀飾₩20,000-60,000。\n停車：備有自有停車場，滿位時路邊也可停車，遊覽車亦可路邊停靠。\n注意事項：週五、週日開店時間為12:00或13:00（依當週公告調整），建議出發前看Instagram最新公告確認。","place_id":"ChIJedtbzpP7DDURkRVgX71Mr_c"},{"cat":"購物","route":"市區","zh":"my jeju GIFT","en":"MY JEJU GIFT","kr":"엠와이제주","naver_url":"https://map.naver.com/p/entry/place/1049190960","addr_en":"35 Sammu-ro, Jeju-si","addr_kr":"삼무로 35, 제주시","lat":33.4900551,"lng":126.4906319,"hours":"11:00-00:00","price":"依消費而定","day":[6],"note":"【購物】被稱為「米菲兔天堂」的大型濟州限定紀念品店！店鋪外觀有醒目紅色米菲裝飾，超好認，提供免稅退稅服務，店員友善。\n推薦：濟州橘子米菲玩偶、米菲橘子編織掛件（約₩9,500-14,000）、各式限定文創雜貨。\n停車：可沿建築物外牆邊停車，車位有限，柵欄管制區域無法使用。","place_id":"ChIJRQDTPAD7DDURScDTUih7U6A"},{"cat":"咖啡廳","route":"東北","zh":"London Bagel Museum","en":"London Bagel Museum","kr":"런던베이글뮤지엄","naver_url":"https://map.naver.com/p/entry/place/1422544447","addr_en":"85 Dongbok-ro, Gujwa-eup, Jeju, South Korea","addr_kr": ,"route":"西南","zh":"鴛鴦瀑布","en":"Wonang Falls","kr":"원앙폭포","naver_url":"https://map.naver.com/p/entry/place/17054754","addr_en":"137 Donnaeko-ro, Seogwipo-si","addr_kr":"서귀포시 돈내코로 137","lat":33.3000248,"lng":126.5815499,"hours":"24小時（夏季6-9月為戲水旺季）","price":"免費","place_id":"ChIJhcTEZBxVDDUR8r2GtHLP9PA","day":[4],"note":"【自然景觀】돈내코（頓乃克）溪谷內的隱藏版瀑布，溪水呈現罕見的透澈藍綠色，是濟州公認最美的溪谷景色之一；從停車場（鄰近遊園地）步行約20分鐘才能抵達瀑布，沿途需下切一段較陡的階梯與碎石路，建議穿防滑鞋前往。\n推薦：夏季戲水旺季西歸浦市會提供救生衣租借。\n停車：鄰近遊園地設有停車場。\n注意事項：溪水終年偏冰涼，戲水時間不宜過久；建議平日清晨前往，可避開夏季週末及陰曆7月15日百中節前後的戲水人潮尖峰，停車也較為容易；水質清澈度會因天候與季節略有不同，建議攜帶泳衣輕裝前往；與鄰近的돈내코계곡（Donnaeko Valley）路標不同，出發前先確認方向以免走錯。"},{"cat":"美食","route":"西南","zh":"黑豬肉海鮮三合 西歸浦올레市場店","en":"Heukdwaeji Haemul Samhap Seogwipo Olle Market","kr":"흑돼지해물삼합 서귀포올레시장점","naver_url":"https://map.naver.com/p/entry/place/1056894347","addr_en":"50 Taepyeong-ro 482beon-gil, Seogwipo-si","addr_kr":"서귀포시 태평로482번길 50","lat":33.2457007,"lng":126.5703863,"hours":"12:00-22:00（16:00-17:00休息）","price":"約₩25,000-40,000/人","dish":"黑豬肉海鮮","place_id":"ChIJcVHSpgZTDDUR4F7tCljEY9E","day":[4],"note":"【美食】西歸浦在地經營超過8年的黑豬肉海鮮三合鍋，把黑豬肉、章魚、鮑魚、蠑螺等海鮮一起在鐵板上煎烤，員工全程代烤；用餐環境乾淨不油煙，適合帶長輩與小孩的家庭聚餐或多人聚會。\n推薦：鐵板加奶油煎鮑魚和章魚，香氣濃郁；附餐몸국(褐藻豬骨湯)湯頭濃郁，海帶芽咬感十足；招牌흑돼지해물삼합(黑豬肉海鮮三合)₩69,000、대패해물삼합(五花肉海鮮三合)₩64,000、제주 근고기세트(濟州整塊肉套餐，600g)₩60,000，也可單點뿔소라(蠑螺)/키조개(江珧貝)/문어(章魚)各₩20,000。\n停車：停車場空間非常大好停車。"},{"cat":"美食","route":"西線沿海","zh":"놀맨","en":"Nolman","kr":"놀맨","naver_url":"https://map.naver.com/p/entry/place/31542957","addr_en":"24 Aewol-ro 1-gil, Aewol-eup, Jeju-si","addr_kr":"제주시 애월읍 애월로1길 24","lat":33.4624775,"lng":126.3102121,"hours":"約10:00-15:00（週三時常公休，售完為止）","price":"約₩12,000-55,000/人","dish":"海鮮拉麵","place_id":"ChIJ_8dqo6v1DDURExN-q7OztZg","day":[6],"note":"【海鮮拉麵】涯月海岸邊排隊名店，只賣해물라면(海鮮泡麵)這一種主食，用現撈黃道蟹(황게)、淡菜煮成濃郁湯頭，海鮮新鮮度高；黃道蟹肉質軟嫩帶甜、蟹膏濃厚，湯頭清爽不辣，麵條Q彈。\n推薦：招牌해물라면(海鮮拉麵)₩12,000（雙人共食剛好）、스페셜라면(特級海鮮拉麵，加量升級版)₩55,000。\n停車：座位無遮蔭、停車空間有限。\n注意事項：抽號碼牌候位、現場點餐付款即可；風雨大或酷暑特報時可能提前打烊，出發前建議上Naver確認當日是否營業。"},{"cat":"美食","route":"西線沿海","zh":"돈해상 濟州翰林協才黑豬肉","en":"Donhaesang Hallim Hyeopjae Heukdwaeji","kr":"돈해상 제주한림협재흑돼지","naver_url":"https://map.naver.com/p/entry/place/1806188910","addr_en":"39 Gwideok 11-gil (1F), Hallim-eup, Jeju-si","addr_kr":"제주시 한림읍 귀덕11길 39 1층","lat":33.4461864,"lng":126.2959455,"hours":"11:00-21:00（14:00-15:00休息，最後點餐20:30）","price":"約₩25,000-45,000/人","dish":"黑豬肉烤肉","place_id":"ChIJzRI_AxT1DDURdlaxyTxPb1c","day":[5],"note":"【海景黑豬肉燒烤】翰林邑海岸邊的黑豬肉烤肉店，戶外座位正對大海，是濟州西部熱門的夕陽景觀燒烤名店，店外掛滿浪漫燈串裝飾；黑豬肉肉質厚實不柴，員工協助代烤。\n推薦：附餐메밀냉면(蕎麥冷麵，附芥末醋滴管很可愛)清爽解膩，된장찌개(大醬湯)、泡菜都很夠味；招牌흑돼지오겹살(黑豬五花肉)₩20,000、흑돼지목살(黑豬頸肉)₩20,000、양념돼지갈비(調味豬肋排，280g)₩17,000，兩人套餐B세트₩59,000份量剛好，也有돈해상정식(돈해상套餐)₩10,000適合簡單吃。\n停車：設有停車場。\n注意事項：日落前後(約17:00-19:00)戶外座位常需候位，建議提早入座卡位置。"},{"cat":"住宿","route":"東南","zh":"Jeju Ri House","en":"Jeju Ri House","kr":"제주리하우스","naver_url":"https://map.naver.com/p/entry/place/209941877","addr_en":"8 Seoseongil-ro 747beon-gil, Seongsan-eup, Seogwipo-si, Jeju-do","addr_kr":"서귀포시 성산읍 서성일로747번길 8","lat":33.4326334,"lng":126.8626825,"hours":"依訂房平台","price":"未提供","day":[3],"note":"【住宿】7/25入住，位於城山日出峰附近的獨棟住宅式民宿，房東為Yuna，距城山日出峰、牛島渡輪碼頭車程都不遠，適合安排東部行程當晚住宿；獨棟形式內含臥室與溫突房，附個人衛浴、個人烤肉場地與草坪庭院。\n推薦：提供早餐，評論多稱讚早餐豐盛。\n停車：免費停車。\n注意事項：評論多稱讚獨棟隱私感佳，是城山周邊安靜的住宿選擇。"},{"cat":"住宿","route":"西線沿海","zh":"楮旨文化藝術村柑橘園民宿","en":"Jeoji Cultural Arts Village Citrus Field Guesthouse","kr":"저지문화예술인마을 감귤밭","addr_en":"21-1 Jeoji 1-gil, Hangyeong-myeon, Jeju-si, Jeju-do 63005","addr_kr":"제주시 한경면 저지1길 21-1","lat":33.3273458,"lng":126.2523687,"hours":"依訂房平台","price":"未提供","day":[5],"note":"【7/27入住】位於楮旨文化藝術村柑橘園內的3樓獨立房間，格局為5房3衛浴，適合多人團體同住。地點在濟州西側較僻靜的文化藝術村內，需事先與房東聯絡確認會合方式。"},{"cat":"住宿","route":"市區","zh":"龍馬路公寓民宿","en":"Yongma-ro Apartment Guesthouse","kr":"용마로 게스트하우스","addr_en":"1-2 Yongma-ro, Jeju-si, Jeju-do","addr_kr":"제주시 용마로 1-2","lat":33.5148,"lng":126.5058,"hours":"依訂房平台","price":"未提供","day":[6],"note":"【7/28入住】濟州市區膳宿公寓，可住5人，3間臥室3張床1間衛浴。大樓內附設私人停車位，適合自駕最後一晚。入住下午4點後，退房上午11點前，離開後請透過Airbnb訊息告知房東已離開。"},{"cat":"購物","route":"市區","zh":"The Islander","en":"The Islander","kr":"더 아일랜더","naver_url":"https://map.naver.com/p/entry/place/35051943","addr_en":"7 Gwandeok-ro 4-gil, Jeju-si","addr_kr":"제주시 관덕로4길 7","lat":33.5123972,"lng":126.5213552,"hours":"09:00-19:30","price":"依消費而定","place_id":"ChIJuT9Dv1bjDDURrgTx4xxov5c","day":[6],"note":"【購物】七星街代表性的文創香水與伴手禮選物店，比一般伴手禮店特別。\n推薦：茶包、香水是招牌品項。\n停車：店家建議停在城內教會（성내교회）前的停車場最方便，若臨時停在巷弄內請留意安全。"},{"cat":"購物","route":"市區","zh":"Classic Moongusa","en":"Classic Moongusa","kr":"클래식문구사","naver_url":"https://map.naver.com/p/entry/place/1046073364","google_url":"https://www.google.com/maps?cid=3692494586519357130","addr_en":"1-2 Gwandeok-ro 4-gil, Jeju-si","addr_kr":"제주시 관덕로4길 1-2","lat":33.5126222,"lng":126.521298,"hours":"10:30-19:00（週三不定期公休，建議出發前上Naver確認）","price":"依消費而定","day":[6],"note":"【購物】復古風手帳文具選物店，商品種類豐富，喜歡手帳、文具的人可以逛很久。\n停車：門口巷弄較窄不可停車，建議停三徒二洞839公有停車場（30分鐘後開始收費，週末免費），沿路走到관덕로4길1-2約3分鐘可達。"},{"cat":"咖啡廳","route":"市區","zh":"Urban Brewing","en":"Urban Brewing","kr":"어반브루잉","naver_url":"https://map.naver.com/p/entry/place/1338214208","google_url":"https://www.google.com/maps?cid=2408575975997563295","addr_en":"16-1 Gwandeok-ro, Jeju-si","addr_kr":"제주시 관덕로 16-1","lat":33.5128125,"lng":126.5210634,"hours":"09:00-18:30（週日公休）","price":"約₩3,300-10,000/人","day":[6],"note":"【咖啡廳】七星路街角的精品手沖咖啡館，大面採光落地窗氛圍感十足，很適合拍照；手沖咖啡選項多元。\n推薦：招牌세탁소라떼(洗衣店拿鐵)₩7,500、클래식밀크티(經典奶茶)₩7,000、바스크치즈케이크(巴斯克起司蛋糕)₩6,000都是人氣品項，대인기 크림 에스프레소 그라니따(人氣奶霜濃縮咖啡冰沙)₩6,000也是招牌款，우도땅콩다쿠아즈(牛島花生達克瓦茲)、제주말차다쿠아즈(濟州抹茶達克瓦茲)各₩3,300適合當茶點。\n停車：巷弄內可停車，外帶可在店門口臨停，週末假日鄰近公有停車場免費開放。\n注意事項：喜歡濃醇口感可試곰탕같이구수한카페라떼(濃醇拿鐵)，怕酸可選시지않은아메리카노(不酸美式)；也有드립백기프트세트(掛耳咖啡禮盒)可當伴手禮帶回家。"},{"cat":"購物","route":"市區","zh":"Matin Kim Hago Haus","en":"Matin Kim Hago Haus","kr":"마뗑킴 하고하우스 제주점","naver_url":"https://map.naver.com/p/entry/place/1525252166","google_url":"https://www.google.com/maps?cid=18086316666859865511","addr_en":"27-5 Jungang-ro (1-2F), Jeju-si","addr_kr":"제주시 중앙로 27-5 1,2층","lat":33.5156601,"lng":126.5252612,"hours":"10:00-21:00","price":"依消費而定","day":[6],"note":"【購物】人氣服飾品牌Matin Kim在濟州的複合選物空間「hago haus」，1、2樓皆為賣場，是七星街蓮洞一帶潮牌店聚集區的指標店家 ":"Salomon 濟州店","en":"Salomon Jeju","kr":"살로몬 제주점","naver_url":"https://map.naver.com/p/entry/place/1670694152","google_url":"https://www.google.com/maps?cid=10296407168650609033","addr_en":"5 Tapdong-ro (1F), Jeju-si","addr_kr":"제주시 탑동로 5 1층","lat":33.5167543,"lng":126.5244084,"hours":"10:30-21:00","price":"依消費而定","day":[6],"note":"【購物】戶外機能鞋款與服飾品牌門市，與地下樓層的Helinox同棟，塔洞碼頭戶外品牌一日遊的其中一站。\n停車：同樣建議停放塔洞第1公營停車場後步行前往。"},{"cat":"景點","route":"牛島","zh":"牛島燈塔公園","en":"Udo Lighthouse Park","kr":"우도등대공원","naver_url":"https://map.naver.com/p/entry/place/17041410","google_url":"https://www.google.com/maps?cid=16694124406381812679","addr_en":"105 Udobong-gil, Udo-myeon, Jeju-si","addr_kr":"제주시 우도면 우도봉길 105","lat":33.4927775,"lng":126.9655411,"hours":"24小時","price":"免費","day":[2],"note":"【景點】牛島著名的白色燈塔景觀公園，鄰近牛島峰步道入口，可俯瞰牛島東側海岸線，是環島路線上熱門的拍照停留點。\n注意事項：需從城山港搭乘渡輪（約30分鐘一班）前往牛島後，再轉乘島上交通工具抵達。"},{"cat":"景點","route":"牛島","zh":"黑沙灘（檢滅來海水浴場）","en":"Geommeolle (Black Sand) Beach","kr":"검멀레해수욕장","naver_url":"https://map.naver.com/p/entry/place/13491583","google_url":"https://www.google.com/maps?cid=17280170030733532442","addr_en":"Udo-myeon, Jeju-si","addr_kr":"제주시 우도면","lat":33.4973079,"lng":126.96702,"hours":"24小時","price":"免費","day":[2],"note":"【景點】牛島南側特有的黑色玄武岩沙灘，屬於牛島八景之一，適合環島途中在此稍作休息看海。\n推薦：沙灘周邊有多間海景咖啡廳，如밭318、달그리안。"},{"cat":"咖啡廳","route":"牛島","zh":"Blanc Rocher","en":"Blanc Rocher","kr":"블랑로쉐","naver_url":"https://map.naver.com/p/entry/place/772362739","google_url":"https://www.google.com/maps?cid=4901999149610652375","addr_en":"783 Udohaean-gil (1F), Udo-myeon, Jeju-si","addr_kr":"제주시 우도면 우도해안길 783 1층","lat":33.5156469,"lng":126.9579626,"hours":"10:00-17:00","price":"依消費而定","day":[2],"note":"【咖啡廳】牛島東北側海岸咖啡廳，鄰近飛揚島渡輪入口，環島騎行途中適合停留賞海景喝咖啡，戶外座位可攜帶寵物同行。\n推薦：招牌땅콩아이스크림(花生奶油冰淇淋)與땅콩크림라떼(花生奶油拿鐵)是濟州牛島特有的花生風味人氣品項，也有多款起司蛋糕可選。\n停車：無專屬停車場，牛島當地多為路邊停車。"},{"cat":"咖啡廳","route":"市區","zh":"Doux Forêt","en":"Doux Forêt","kr":"듀포레","naver_url":"https://map.naver.com/p/entry/place/1641688547","google_url":"https://www.google.com/maps?cid=3797931896586069119","addr_en":"579 Seohaean-ro, Jeju-si","addr_kr":"제주시 서해안로 579","lat":33.5185278,"lng":126.5000943,"hours":"10:00-21:00","price":"約₩5,000-9,000/人","day":[6],"note":"【咖啡廳】濟州機場附近的海景烘焙咖啡廳，靠窗座位能同時看到蔚藍大海，3樓露台是拍攝飛機低空降落的熱門機位；落地窗景觀在陰雨天也別有氛圍。\n推薦：招牌카이막(土耳其奶醅)系列，소금빵(鹽可頌)、바스크 치즈 케이크(巴斯克起司蛋糕)也很受歡迎。\n停車：設有停車場。\n注意事項：카이막系列常在上午就售完，想吃到本店的카이막세트建議早點到；距離租車還車點車程約10分鐘，適合安排在離開濟州前的最後一站。"},{"cat":"美食","route":"市區","zh":"豚舍豚 本店","en":"Donsadon Main Branch","kr":"돈사돈 본점","naver_url":"https://map.naver.com/p/entry/place/11840561","google_url":"https://www.google.com/maps?cid=13888053500610622232","addr_en":"19 Upyeong-ro, Jeju-si","addr_kr":"제주시 우평로 19","lat":33.4788636,"lng":126.4639591,"hours":"12:00-22:00（週二公休，可改至別館）","price":"約₩35,000-50,000/人","dish":"黑豬肉烤肉","day":[1,6],"note":"【美食】濟州島最具代表性的黑豬肉烤肉創始店，員工會全程桌邊代烤，肉質厚實多汁，沾一點鹽就很夠味；店招牌上掛著老闆的照片，是老字號的象徵；距濟州機場車程不遠，適合抵達或離開濟州時安排一餐。\n推薦：招牌是切得厚實的濟州產흑돼지근고기(黑豬肉，400g/600g/800g份量可選)。\n停車：設有停車場。\n注意事項：晚間用餐時段人潮較多，建議提早到或先訂位。"},{"cat":"美食","route":"市區","zh":"豚舍豚 別館","en":"Donsadon Annex","kr":"돈사돈 별관","naver_url":"https://map.naver.com/p/entry/place/37664133","google_url":"https://www.google.com/maps?cid=4848892538023993737","addr_en":"15 Gwangpyeongdong-ro, Jeju-si","addr_kr":"제주시 광평동로 15","lat":33.4816692,"lng":126.470708,"hours":"12:00-22:30（週三公休）","price":"約₩30,000-50,000/人","dish":"黑豬肉烤肉","day":[1,6],"note":"【美食】豚舍豚本店的別館分店，本店人潮較多時的替代選擇，適合本店客滿時就近改到這裡用餐；同樣提供員工代烤服務。\n推薦：黑豬肉근고기菜單與份量選項（400g/600g/800g）與本店相同，另外還多了백돼지근고기(白豬肉)可選，價格較黑豬肉略低；收尾可加點김치찌개(泡菜鍋)配白飯。\n停車：設有停車場。"},{"cat":"美食","route":"市區","zh":"姐妹麵館","en":"Jamae Guksu (Sisters Noodle House)","kr":"자매국수","naver_url":"https://map.naver.com/p/entry/place/37060300","google_url":"https://www.google.com/maps?cid=9981338423687140734","addr_en":"46 Hanggolnam-gil, Jeju-si","addr_kr":"제주시 항골남길 46","lat":33.4985513,"lng":126.4591844,"hours":"09:00-18:00（14:30-16:10休息，週三公休）","price":"約₩10,000-19,000/人","dish":"豬肉湯麵","day":[1,6],"note":"【美食】濟州傳統麵食代表店家；距濟州機場很近，很適合排進落地或離境前的第一餐/最後一餐；店內空間寬敞、用平板點餐。\n推薦：招牌고기국수(豬肉湯麵)湯頭濃郁不腥、口感濃而不膩，비빔국수(辣拌麵)酸甜辣交織也很受歡迎，兩道都是每碗₩10,000；돔베고기(豬肉拼盤)可加點分食，36個月以下幼兒的兒童麵是免費招待。\n停車：設有停車場。\n注意事項：建議先用캐치테이블(CatchTable)線上預約可省去現場候位。"},{"cat":"美食","route":"東南","zh":"Batata食卓","en":"Batata Siktak","kr":"바타타식탁","naver_url":"https://map.naver.com/p/entry/place/1946221889","google_url":"https://www.google.com/maps?cid=11235300300361242370","addr_en":"22 Pyeoseondongseo-ro 264beon-gil (2F), Pyoseon-myeon, Seogwipo-si","addr_kr":"서귀포시 표선면 표선동서로264번길 22 2층","lat":33.3271509,"lng":126.8359139,"hours":"12:00-22:00","price":"約₩27,000-65,000/人","dish":"甜蝦","day":[3,4],"note":"【美食】表善一帶的濟州特產딱새우(甜蝦)專門店；鄰近海比치(Haevichi)度假村一帶，適合安排在表善住宿的用餐選擇，帶小孩同行也很合適。\n推薦：招牌바타타 회 세트(甜蝦生食套餐)₩65,000可一次吃到生蝦、蒸蝦與海鮮拌飯，吃完蝦頭還能加點煮成蝦湯拉麵；제주자연산딱새우회(濟州野生甜蝦生魚片)₩39,000喜歡生食可單點，마라딱새우(麻辣甜蝦)、딱새우 소고기 전골(甜蝦牛肉鍋)₩27,000也是人氣品項。\n停車：設有停車場。"},{"cat":"美食","route":"東南","zh":"表善烏龍麵店","en":"Pyeseon Udon Shop","kr":"표선우동가게","naver_url":"https://map.naver.com/p/entry/place/1250319244","google_url":"https://www.google.com/maps?cid=16425344752670201767","addr_en":"105-1 Pyeseongwanjeong-ro, Pyoseon-myeon, Seogwipo-si","addr_kr":"서귀포시 표선면 표선관정로 105-1","lat":33.3240868,"lng":126.8312942,"hours":"11:20-20:20（15:00-17:00休息）","price":"約₩8,000-17,000/人","dish":"烏龍麵","day":[3,4],"note":"【美食】表善在地烏龍麵與炸豬排專門店，麵條Q彈有嚼勁；店內空間寬敞乾淨，適合帶小孩同行，是表善一帶在地人也常光顧的日常美食選擇。\n推薦：텐푸라가케우동(炸物烏龍麵)、규니꾸가케우동(牛肉烏龍麵)都很受歡迎，치즈돈까스(起司炸豬排)、생등심돈까스(里肌炸豬排)套餐附湯與小菜份量足。\n停車：無專屬停車場，多為路邊停車。"},{"cat":"美食","route":"東北","zh":"海女海苔飯捲","en":"Haenyeo Gimbap","kr":"해녀김밥 본점","dish":"海苔飯捲","naver_url":"https://map.naver.com/p/entry/place/1989759621","google_url":"https://www.google.com/maps?cid=12534396425019166435","addr_en":"40 Hamdeok-ro (3F, Unit 302), Jocheon-eup, Jeju-si","addr_kr":"제주시 조천읍 함덕로 40 3층 302호","lat":33.5423058,"lng":126.6711119,"hours":"09:00-15:40（週日公休，售完為止）","price":"約₩8,500-11,000/人","day":[1],"note":"【美食】咸德海邊3樓的人氣飯捲店，正對함덕해수욕장的祖母綠海景，邊吃邊看海是最大賣點。\n推薦：招牌해녀김밥(海女飯捲，同店名招牌)₩9,000用蛋皮和內餡拌得色彩繽紛，매오김밥(辣炒魷魚飯捲)₩9,500微辣夠味，딱새우김밥(甜蝦飯捲)、전복김밥(鮑魚飯捲)各₩9,000-9,500也 // ── LOCATE ME ────────────────────────────────
let meMarker=null;
const LocateControl=L.Control.extend({
  options:{position:"topleft"},
  onAdd:function(){
    const div=L.DomUtil.create("div","locate-btn");
    div.title="定位我的位置";
    div.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"></circle><path d="M12 2v3M12 19v3M2 12h3M19 12h3"></path></svg>';
    L.DomEvent.disableClickPropagation(div);
    L.DomEvent.on(div,"click",()=>locateMe(div));
    return div;
  }
});
map.addControl(new LocateControl());

function locateMe(btn){
  if(!navigator.geolocation){btn.classList.add("err");setTimeout(()=>btn.classList.remove("err"),1500);return;}
  btn.classList.add("locating");
  navigator.geolocation.getCurrentPosition(pos=>{
    btn.classList.remove("locating");
    const lat=pos.coords.latitude,lng=pos.coords.longitude;
    if(meMarker)map.removeLayer(meMarker);
    meMarker=L.marker([lat,lng],{
      icon:L.divIcon({className:"",html:'<div class="me-dot"><div class="me-dot-pulse"></div></div>',iconSize:[16,16],iconAnchor:[8,8]}),
      zIndexOffset:10000,interactive:false
    }).addTo(map);
    map.setView([lat,lng],15,{animate:true});
  },()=>{
    btn.classList.remove("locating");
    btn.classList.add("err");
    setTimeout(()=>btn.classList.remove("err"),1500);
  },{enableHighAccuracy:true,timeout:8000,maximumAge:30000});
}

// ── NOTE PARSER ───────────────────────────────
// 把純文字筆記解析成帶排版的 HTML
function parseNote(note){
  if(!note) return "";
  let html = "";
  // 分段：用換行分開
  const lines = note.split(/\n/).filter(l=>l.trim());
  lines.forEach(line=>{
    line = line.trim();
    if(!line) return;

    let content = line;
    // 移除星號評分
    content = content.replace(/★+/g,"");
    // 處理 ₩ 金額標色
    content = content.replace(/(₩[\d,，,，-]+(?:韓幣)?(?:\/[人份個])?)/g,'<span class="note-price">$1</span>');
    // ⚠️ 文字標紅
    content = content.replace(/⚠️\s*/g,'<span class="note-warn">⚠ </span>');

    html += '<div class="note-section"><div class="note-body">' + content + '</div></div>';
  });
  return html || '<div class="note-body">'+note+'</div>';
}

  if(!pc.classList.contains("is-open")){if(cb)cb();return;}
  pc.classList.remove("is-open");
  pw.classList.add("closing");
  const dur=isMob()?260:220;
  setTimeout(()=>{
    pw.classList.remove("closing");
    if(cb)cb();
    else if(selIdx!==null){selIdx=null;renderMarkers();renderList();}
  },dur);
}

function showPopup(idx){
  const p=DATA[idx];
  const col=COL[p.cat],em=EMO[p.cat];
  // naver_url：若有店家提供的 Naver Map 專屬連結就直接用，否則退回韓文店名搜尋（與 Google Maps 上的名稱一致）
  const nurl=p.naver_url
    ?p.naver_url
    :"https://map.naver.com/v5/search/"+encodeURIComponent(p.kr);

  // 色條
  document.getElementById("pbar").style.cssText="height:5px;background:"+col;

  // 頭部
  document.getElementById("pc-head").innerHTML=
    '<div class="pc-head">'+
      '<div class="pc-head-left">'+
        '<div class="pc-cat" style="color:'+col+'">'+em+' '+p.cat+'</div>'+
        '<div class="pc-name">'+p.zh+'</div>'+
        '<div class="pc-kr">'+p.kr+' · '+p.en+'</div>'+
      '</div>'+
    '</div>';

  // Pills
  document.getElementById("pc-pills").innerHTML=
    '<div class="pc-pills">'+
      '<div class="pc-pill">'+
        '<span class="pc-pill-ico">⏰</span>'+
        '<div><div class="pc-pill-lbl">營業時間</div><div class="pc-pill-val">'+p.hours+'</div></div>'+
      '</div>'+
      '<div class="pc-pill">'+
        '<span class="pc-pill-ico">💰</span>'+
        '<div><div class="pc-pill-lbl">平均消費</div><div class="pc-pill-val">'+p.price+'</div></div>'+
      '</div>'+
    '</div>';

  // 筆記
  const noteHtml = parseNote(p.note);
  document.getElementById("pc-note").innerHTML=
    '<div class="pc-note-wrap">'+
      '<div class="pc-note-title">📝 旅遊筆記</div>'+
      '<div class="pc-note-body">'+noteHtml+'</div>'+
    '</div>';

  // 按鈕
  document.getElementById("pc-btns").innerHTML=
    '<div class="pc-btns">'+
      '<a class="pc-btn pc-btn-n" href="'+nurl+'" target="_blank">Naver Map</a>'+
    '</div>';

  // 動畫
  pw.classList.remove("closing");
  pc.classList.remove("is-open");
  void pc.offsetWidth; // reflow
  requestAnimationFrame(()=>{ pc.classList.add("is-open"); });
}

// ── MARKERS ──────────────────────────────────
function mkIcon(cat,sel){
  const col=COL[cat],s=sel?22:14,b=sel?3:2;
  const ring=sel?",0 0 0 4px "+col.replace(")",",0.2)"):"";
  return L.divIcon({
    className:"",
    html:'<div style="width:'+s+'px;height:'+s+'px;background:'+col+';border:'+b+'px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.3)'+ring+';cursor:pointer;transition:all .15s"></div>',
    iconSize:[s,s],iconAnchor:[s/2,s/2]
  });
}
function renderMarkers(){
  lmarkers.forEach(m=>map.removeLayer(m));lmarkers=[];
  DATA.forEach((p,i)=>{
    if(!visible(p))return;
    const m=L.marker([p.lat,p.lng],{icon:mkIcon(p.cat,selIdx===i),zIndexOffset:selIdx===i?9999:0});
    m.on("click",e=>{L.DomEvent.stopPropagation(e);selectPlace(i);});
    m.addTo(map);lmarkers.push(m);
  });
}
map.on("click",()=>closePopup(null));

// ── SELECT ────────────────────────────────────
function selectPlace(idx){
  const wasOpen=pc.classList.contains("is-open");
  const doSelect=()=>{
    selIdx=idx;renderMarkers();renderList();showPopup(idx);
    const p=DATA[idx];
    map.setView([p.lat,p.lng],Math.max(map.getZoom(),14),{animate:true,duration:.4});
    document.querySelectorAll(".pitem.sel").forEach(el=>el.scrollIntoView({behavior:"smooth",block:"nearest"}));
    if(isMob())closeSB();
  };
  if(wasOpen&&selIdx!==idx) closePopup(doSelect);
  else doSelect();
}

// ── SEARCH ────────────────────────────────────
function onSearch(v){searchQ=v.trim();document.getElementById("sw").classList.toggle("has-value",!!searchQ);selIdx=null;closePopup(null);renderMarkers();renderList();}
function clearSearch(){const i=document.getElementById("si");i.value="";i.focus();onSearch("");}

// ── LIST ──────────────────────────────────────
function renderList(){
  const pl=document.getElementById("pl");
  const vis=DATA.filter(p=>visible(p));
  document.getElementById("sbc").textContent=vis.length+" 個";
  document.getElementById("vc").textContent=vis.length+" 個地點";
  if(!vis.length){pl.innerHTML='<div class="no-result">🔍 找不到符合的地點</div>';return;}
  const g={};
  DATA.forEach((p,i)=>{if(!visible(p))return;(g[p.cat]=g[p.cat]||[]).push({p,i});});
  const order=["交通","住宿","景點","購物","咖啡廳","美食"];
  let html="";
  order.forEach(cat=>{
    if(!g[cat])return;
    const col=COL[cat];
    html+='<div class="cat-hdr" style="color:'+col+'">'+EMO[cat]+' '+cat+' <span style="color:var(--muted);font-weight:500;font-size:9px">('+g[cat].length+')</span><div class="cat-hdr-line"></div></div>';
    g[cat].forEach(({p,i})=>{
      const sel=selIdx===i;
      html+='<div class="pitem'+(sel?" sel":"")+'" onclick="selectPlace('+i+')">'+
        '<div class="pitem-top"><div class="pdot" style="background:'+COL[p.cat]+'"></div>'+
        '<div class="pname">'+p.zh+'</div></div>'+
        '<div class="pen">'+p.en+'</div>'+
        (p.dish?'<div class="pdish">'+p.dish+'</div>':'')+
        '<div class="pmeta">'+
          '<span class="ptag">⏰ '+p.hours+'</span>'+
          '<span class="ptag" style="color:var(--accent)">💰 '+p.price+'</span>'+
        '</div></div>';
    });
  });
  pl.innerHTML=html;
}

// ── FILTERS ───────────────────────────────────
const CAT_ALL=["交通","住宿","景點","購物","咖啡廳","美食"];
const ROUTE_ALL=["牛島","東南","東北","西南","中段","西線沿海","市區"];
function syncGroupUI(){
  const catBtn=document.querySelector('[data-group="cat"]');
  if(catBtn)catBtn.classList.toggle("active",cats.size===CAT_ALL.length);
  const routeBtn=document.querySelector('[data-group="route"]');
  if(routeBtn)routeBtn.classList.toggle("active",routes.size===ROUTE_ALL.length);
}
function selectAllGroup(btn){
  const group=btn.dataset.group;
  if(group==="cat"){
    if(cats.size===CAT_ALL.length){cats.clear();}
    else{CAT_ALL.forEach(c=>cats.add(c));}
    document.querySelectorAll("[data-cat]").forEach(b=>b.classList.toggle("active",cats.has(b.dataset.cat)));
  } else if(group==="route"){
    if(routes.size===ROUTE_ALL.length){routes.clear();}
    else{ROUTE_ALL.forEach(r=>routes.add(r));}
    document.querySelectorAll("[data-route]").forEach(b=>b.classList.toggle("active",routes.has(b.dataset.route)));
  }
  syncGroupUI();
  closePopup(null);renderMarkers();renderList();
}
function toggleCat(btn){
  const cat=btn.dataset.cat;
  if(cats.has(cat)){cats.delete(cat);btn.classList.remove("active");}
  else{cats.add(cat);btn.classList.add("active");}
  syncGroupUI();
  closePopup(null);renderMarkers();renderList();
}
function toggleRoute(btn){
  const route=btn.dataset.route;
  if(routes.has(route)){routes.delete(route);btn.classList.remove("active");}
  else{routes.add(route);btn.classList.add("active");}
  syncGroupUI();
  closePopup(null);renderMarkers();renderList();
}
renderMarkers();
renderList();
</script>
</body>
</html>
